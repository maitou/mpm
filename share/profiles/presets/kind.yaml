# no_proxy: kind defaults (pod/service CIDR) + typical kind docker network + in-cluster DNS.
proxy:
  summary: "HTTP(S) proxy systemd drop-ins inside kind node containers (containerd + kubelet)"
  params:
    PROXY_HOST: GATEWAY_IP
    PROXY_PORT: "7890"
  http_proxy: "http://${PROXY_HOST}:${PROXY_PORT}"
  https_proxy: "http://${PROXY_HOST}:${PROXY_PORT}"
  all_proxy: "socks5://${PROXY_HOST}:${PROXY_PORT}"
  no_proxy: "localhost,127.0.0.1,::1,127.0.0.0/8,10.96.0.0/16,10.244.0.0/16,172.18.0.0/16,.svc,.cluster.local"
  restart_units:
    - containerd.service
    - kubelet.service
  probe: "https://hub.docker.com"

direct:
  summary: "Remove mpm proxy drop-ins from kind node containers"
  http_proxy: ""
  https_proxy: ""
  all_proxy: ""
  no_proxy: ""
  restart_units:
    - containerd.service
    - kubelet.service
  probe: ""
