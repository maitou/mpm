# no_proxy: k3s default pod CIDR (Flannel) + service CIDR + in-cluster names; adjust if your cluster uses different CIDRs.
proxy:
  summary: "HTTP(S) proxy env for k3s systemd units (drop-in)"
  http_proxy: "http://${GATEWAY_IP}:7890"
  https_proxy: "http://${GATEWAY_IP}:7890"
  all_proxy: "socks5://${GATEWAY_IP}:7890"
  no_proxy: "localhost,127.0.0.1,::1,127.0.0.0/8,10.42.0.0/16,10.43.0.0/16,.svc,.cluster.local"
  restart_units:
    - k3s.service
    - k3s-agent.service
  probe: "https://hub.docker.com"

direct:
  summary: "Remove mpm k3s systemd drop-ins"
  http_proxy: ""
  https_proxy: ""
  all_proxy: ""
  no_proxy: ""
  restart_units:
    - k3s.service
    - k3s-agent.service
  probe: ""
