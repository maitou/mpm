# mpm system overrides template (install seeds /etc/mpm/overrides.yaml; edit with sudo)
# Priority: scopes.<id> > defaults > built-in preset
# proxy_host: builtin token (DEFAULT_IP, HOST_IP, GATEWAY_IP, WSL_HOST_IP) or literal IP/hostname
# proxy_port: "1"–"65535"
# no_proxy: full replacement string (not merged with preset)

